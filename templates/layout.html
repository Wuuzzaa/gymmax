<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGYM Fortschritts-Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #121212;
        }
        .sidebar {
            height: 100vh;
            position: sticky;
            top: 0;
            background-color: #1e1e1e;
            padding: 1.5rem;
        }
        .sidebar-link {
            color: #ccc;
            text-decoration: none;
            display: block;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            margin-bottom: 0.2rem;
        }
        .sidebar-link:hover {
            background-color: #2c2c2c;
            color: #fff;
        }
        .sidebar-link.active {
            background-color: #0d6efd;
            color: #fff;
        }
        .card {
            background-color: #1e1e1e;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .main-content {
            padding: 2rem;
        }
        .diff-pos { color: #28a745; }
        .diff-neg { color: #dc3545; }
        .diff-zero { color: #6c757d; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-none d-md-block sidebar shadow-sm">
                <h4 class="mb-4 text-primary">
                    <i class="fas fa-dumbbell"></i> EGYM Tracker
                </h4>
                <a href="/" class="sidebar-link {% if request.path == '/' %}active{% endif %}">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>
                <a href="/ai-coach" class="sidebar-link {% if request.path == '/ai-coach' %}active{% endif %}">
                    <i class="fas fa-robot me-2"></i> AI Coach
                </a>
                <hr>
                <div class="sidebar-heading text-muted mb-2 ps-3" style="font-size: 0.8rem; text-transform: uppercase;">
                    Übungen
                </div>
                {% block sidebar %}{% endblock %}
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
